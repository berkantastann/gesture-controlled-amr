# ros2_control controller_manager + controller konfigürasyonu
#   wheel_separation : 0.44 m  (base_width 0.40 + wheel_width 0.04)
#   wheel_radius     : 0.075 m
#   lift_joint range : 0.0 .. 0.15 m

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    lift_controller:
      type: effort_controllers/JointGroupEffortController


diff_drive_controller:
  ros__parameters:
    use_sim_time: true

    left_wheel_names:  ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.44
    wheel_radius: 0.075

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    publish_limited_velocity: false
    use_stamped_vel: false

    # Hız / ivme limitleri (Ignition diff-drive plugin'indeki değerlerle uyumlu)
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity:      1.0
    linear.x.min_velocity:     -1.0
    linear.x.max_acceleration:  1.0
    linear.x.min_acceleration: -1.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity:      2.0
    angular.z.min_velocity:     -2.0
    angular.z.max_acceleration:  2.0
    angular.z.min_acceleration: -2.0


lift_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - lift_joint
